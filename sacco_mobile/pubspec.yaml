name: sacco_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+12

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  go_router: ^17.3.0
  flutter_secure_storage: ^10.3.1
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.1.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/la_confiance.png
    - assets/images/logo_2.png


flutter_launcher_icons:
  image_path: "assets/images/la_confiance.png"
  android: true
  ios: true
  min_sdk_android: 21